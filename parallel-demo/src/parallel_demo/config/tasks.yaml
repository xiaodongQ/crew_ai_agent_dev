# 并行执行演示 - Task 配置

research_task:
  description: >
    针对技术主题 "{topic}" 进行快速调研，收集以下信息：
    1. 核心概念和原理（3-5 个关键点）
    2. 典型应用场景（2-3 个）
    3. 当前热点话题和争议点
    4. 适合不同平台的内容角度建议
  expected_output: >
    一份结构化调研报告，包含：
    - 核心概念清单
    - 应用场景描述
    - 热点话题列表
    - 各平台内容角度建议
  agent: researcher

wechat_task:
  description: >
    基于调研报告，为微信平台创作深度技术文章方案：
    1. 设计 3 个备选标题（专业但不枯燥）
    2. 规划文章结构（引言、核心内容、总结）
    3. 提供关键段落示例
    4. 建议配图风格和发布时机
  expected_output: >
    微信文章方案，包含：
    - 3 个备选标题
    - 完整文章大纲
    - 关键段落示例（200-300 字）
    - 发布建议
  agent: wechat_specialist

xiaohongshu_task:
  description: >
    基于调研报告，为小红书创作图文笔记方案：
    1. 设计 3 个爆款标题（带 emoji）
    2. 规划图文搭配（封面图 + 内页）
    3. 编写正文内容（轻松活泼风格）
    4. 提供标签策略（10-15 个标签）
  expected_output: >
    小红书笔记方案，包含：
    - 3 个备选标题（带 emoji）
    - 封面图设计建议
    - 正文内容（300-500 字）
    - 标签列表
  agent: xiaohongshu_specialist

douyin_task:
  description: >
    基于调研报告，为抖音创作短视频脚本：
    1. 设计视频开头 3 秒钩子
    2. 编写完整脚本（30-60 秒）
    3. 建议背景音乐和视觉效果
    4. 设计互动引导语
  expected_output: >
    抖音短视频脚本，包含：
    - 开头钩子（3 秒）
    - 完整分镜脚本
    - BGM 和视觉建议
    - 互动引导语
  agent: douyin_specialist

coordinate_task:
  description: >
    汇总三个平台的内容方案，生成统一执行报告：
    1. 对比各平台内容策略的异同
    2. 识别可复用的核心素材
    3. 提供跨平台协同建议
    4. 制定发布时间表
  expected_output: >
    统一执行报告，包含：
    - 平台策略对比分析
    - 可复用素材清单
    - 协同运营建议
    - 发布时间表（1 周计划）
  agent: coordinator
